<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - GODEX</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- Wrapper for vertical centering -->
  <div class="login-wrapper">

    <div class="login-container glass-effect animate-fade-in">
      <h1>Welcome Back </h1>
      <p class="login-subtitle">Sign in to continue shopping</p>

      <input type="email" id="email" placeholder="Enter your email" required>
      <input type="password" id="password" placeholder="Enter your password" required>

      <button id="login-btn" class="btn-ripple">Login</button>

      <div id="msg" class="error-text"></div>

      <div class="switch-text">
        Don’t have an account?
        <a href="signup.html">Create one</a>
      </div>
    </div>

  </div>

  <script>
    const loginBtn = document.getElementById('login-btn');
    const msgDiv = document.getElementById('msg');

    loginBtn.addEventListener('click', async () => {

      msgDiv.textContent = "";

      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value.trim();

      if (!email || !password) {
        msgDiv.textContent = "Please fill in all fields.";
        return;
      }

      loginBtn.textContent = "Logging in...";
      loginBtn.disabled = true;

      try {
        const res = await fetch('http://127.0.0.1:5000/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });

        const data = await res.json();

        if (res.status === 200) {
          localStorage.setItem('godexUser', JSON.stringify(data));
          window.location.href = 'home.html';
        } else {
          msgDiv.textContent = data.msg;
        }

      } catch (err) {
        msgDiv.textContent = "Server error. Try again.";
      }

      loginBtn.textContent = "Login";
      loginBtn.disabled = false;
    });
  </script>

</body>
</html>

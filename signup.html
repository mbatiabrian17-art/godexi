<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create Account - GODEX</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <div class="login-wrapper">

    <div class="login-container glass-effect animate-fade-in">
      <h1>Create Account </h1>
      <p class="login-subtitle">Join GODEX and start shopping</p>

      <input type="text" id="name" placeholder="Full Name" required>
      <input type="email" id="email" placeholder="Enter your email" required>
      <input type="password" id="password" placeholder="Create a password" required>

      <button id="signup-btn" class="btn-ripple">Sign Up</button>

      <div id="msg" class="error-text"></div>

      <div class="switch-text">
        Already have an account?
        <a href="login.html">Login</a>
      </div>
    </div>

  </div>

  <script>
    const signupBtn = document.getElementById('signup-btn');
    const msgDiv = document.getElementById('msg');

    signupBtn.addEventListener('click', async () => {

      msgDiv.textContent = "";

      const name = document.getElementById('name').value.trim();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value.trim();

      if (!name || !email || !password) {
        msgDiv.textContent = "Please fill in all fields.";
        return;
      }

      signupBtn.textContent = "Creating account...";
      signupBtn.disabled = true;

      try {
        const res = await fetch('http://127.0.0.1:5000/api/signup', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name, email, password })
        });

        const data = await res.json();

        if (res.status === 200 || res.status === 201) {
          msgDiv.style.color = "green";
          msgDiv.textContent = "Account created successfully! Redirecting...";
          setTimeout(() => {
            window.location.href = 'login.html';
          }, 1500);
        } else {
          msgDiv.style.color = "red";
          msgDiv.textContent = data.msg;
        }

      } catch (err) {
        msgDiv.style.color = "red";
        msgDiv.textContent = "Server error. Try again.";
      }

      signupBtn.textContent = "Sign Up";
      signupBtn.disabled = false;
    });
  </script>

</body>
</html>

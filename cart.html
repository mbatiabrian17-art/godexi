<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cart - GODEX</title>
  <link rel="stylesheet" href="css/style.css">
</head>

<body>

<!-- ================= NAVBAR ================= -->
<nav class="navbar">
  <div class="logo">GODEX</div>
  <ul>
    <li><a href="home.html">Home</a></li>
    <li><a href="about.html">About</a></li>
    <li><a href="product.html">Products</a></li>
    <li>
      <button class="theme-toggle" onclick="toggleTheme()">🌙</button>
    </li>
  </ul>
</nav>

<!-- ================= CART ================= -->
<div class="container cart-container glass-effect">
  <h2>Your Cart</h2>

  <div id="cart-items"></div>

  <h3 id="total">Total: Ksh 0</h3>
</div>

<!-- ================= SCRIPTS ================= -->
<script>
  function getCart() {
    return JSON.parse(localStorage.getItem('cart')) || [];
  }

  function saveCart(cart) {
    localStorage.setItem('cart', JSON.stringify(cart));
  }

  function removeFromCart(index) {
    const cart = getCart();
    cart.splice(index, 1);
    saveCart(cart);
    loadCart();
  }

  function loadCart() {
    const cart = getCart();
    const container = document.getElementById('cart-items');
    const totalEl = document.getElementById('total');

    container.innerHTML = '';
    let total = 0;

    if (cart.length === 0) {
      container.innerHTML = `<p>Your cart is empty.</p>`;
      totalEl.textContent = '';
      return;
    }

    cart.forEach((item, index) => {
      total += parseInt(item.price.replace(/[^0-9]/g, ''));

      const div = document.createElement('div');
      div.className = 'cart-item';

      div.innerHTML = `
        <img src="${item.img}" alt="${item.name}">
        <div class="cart-info">
          <h3>${item.name}</h3>
          <p>${item.price}</p>
        </div>
        <button class="remove-btn" onclick="removeFromCart(${index})">✖</button>
      `;

      container.appendChild(div);
    });

    totalEl.textContent = `Total: Ksh ${total.toLocaleString()}`;
  }

  loadCart();
</script>


<script src="js/theme.js"></script>

</body>
</html>
